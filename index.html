<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pet925 | Smart Search</title>
    <style>
        :root { --main-gold: #c5a059; }
        body { font-family: "Helvetica Neue", "Hiragino Sans", sans-serif; background: #fdfdfd; margin: 0; }
        header { padding: 40px 20px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        h1 { font-size: 2.5rem; letter-spacing: 10px; margin: 0; font-weight: 200; text-transform: none; }
        .sub-copy { font-size: 0.6rem; letter-spacing: 3px; color: var(--main-gold); margin-top: 10px; }
        .container { width: 92%; max-width: 1000px; margin: 0 auto; }

        /* 検索窓 */
        .search-box { margin: 20px 0; }
        #search-input { width: 100%; padding: 15px; border: 1px solid #eee; outline: none; font-size: 0.9rem; box-sizing: border-box; }

        /* 絞り込みナビ */
        .filter-nav { padding-bottom: 20px; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid #f0f0f0; }
        .filter-group { margin-bottom: 10px; }
        .group-label { font-size: 0.6rem; font-weight: 700; color: #aaa; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .scroll-box { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .filter-btn { background: #fff; border: 1px solid #eee; padding: 8px 18px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; }

        /* 商品一覧 */
        #product-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; margin-top: 30px; }
        .product-card { background: #fff; display: flex; flex-direction: column; }
        .img-container { width: 100%; height: 350px; overflow: hidden; background: #f5f5f5; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-size: 0.65rem; color: var(--main-gold); font-weight: 700; margin-top: 15px; letter-spacing: 1px; }
        .product-name { font-size: 1.1rem; font-weight: 500; margin: 5px 0 10px 0; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
        .tag { font-size: 0.6rem; color: #999; border: 1px solid #eee; padding: 2px 6px; }
        .btn-shop { text-decoration: none; padding: 12px; font-size: 0.75rem; text-align: center; border: 1px solid #000; font-weight: 700; background: #000; color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>pet925</h1>
    <div class="sub-copy">Scientific Nutrition x High Style</div>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="キーワードで絞り込む（例：ラム, 柴犬）" oninput="render()">
    </div>

    <div class="filter-nav">
        <div class="filter-group">
            <span class="group-label">Animal / 種類</span>
            <div class="scroll-box">
                <button class="filter-btn active" data-cat="animal" data-val="all" onclick="toggleFilter(this)">すべて</button>
                <button class="filter-btn" data-cat="animal" data-val="dog" onclick="toggleFilter(this)">犬 (DOG)</button>
                <button class="filter-btn" data-cat="animal" data-val="cat" onclick="toggleFilter(this)">猫 (CAT)</button>
            </div>
        </div>
        <div class="filter-group">
            <span class="group-label">Condition / お悩み</span>
            <div class="scroll-box">
                <button class="filter-btn active" data-cat="cond" data-val="all" onclick="toggleFilter(this)">すべて</button>
                <button class="filter-btn" data-cat="cond" data-val="tear" onclick="toggleFilter(this)">涙やけケア (TEAR)</button>
                <button class="filter-btn" data-cat="cond" data-val="gf" onclick="toggleFilter(this)">穀物不使用 (GF)</button>
                <button class="filter-btn" data-cat="cond" data-val="diet" onclick="toggleFilter(this)">体重管理 (WEIGHT)</button>
                <button class="filter-btn" data-cat="cond" data-val="kidney" onclick="toggleFilter(this)">腎臓ケア (KIDNEY)</button>
            </div>
        </div>
    </div>

    <div id="product-list"></div>
</div>

<script>
let activeFilters = { animal: "all", cond: "all" };

const productData = [
    // --- ニュートロ 犬用 ---
    { name: "ナチュラル チョイス 成犬用 ラム＆玄米", brand: "Nutro", tags: ["dog", "adult", "skin", "lamb"], img: "https://unsplash.com", amz: "#" },
    { name: "ナチュラル チョイス 減量用 チキン＆玄米", brand: "Nutro", tags: ["dog", "adult", "diet"], img: "https://unsplash.com", amz: "#" },
    { name: "ワイルド レシピ 鹿肉 (超小型犬〜小型犬)", brand: "Nutro", tags: ["dog", "adult", "gf", "tear", "venison"], img: "https://unsplash.com", amz: "#" },
    { name: "ワイルド レシピ ターキー (成犬用)", brand: "Nutro", tags: ["dog", "adult", "gf", "turkey"], img: "https://unsplash.com", amz: "#" },

    // --- シュプレモ 犬用 ---
    { name: "シュプレモ 成犬用 (全犬種用)", brand: "Supremo", tags: ["dog", "adult", "tear"], img: "https://unsplash.com", amz: "#" },
    { name: "シュプレモ 体重管理用", brand: "Supremo", tags: ["dog", "adult", "diet"], img: "https://unsplash.com", amz: "#" },
    { name: "シュプレモ 湖畔のレシピ (ラム/穀物不使用)", brand: "Supremo", tags: ["dog", "adult", "gf", "lamb", "tear"], img: "https://unsplash.com", amz: "#" },
    { name: "シュプレモ エイジングケア (シニア犬用)", brand: "Supremo", tags: ["dog", "senior", "joint"], img: "https://unsplash.com", amz: "#" },

    // --- ロイヤルカナン 犬用 ---
    { name: "CCN ステアライズド (避妊・去勢犬用)", brand: "Royal Canin", tags: ["dog", "adult", "diet"], img: "https://unsplash.com", amz: "#" },
    { name: "CCN ダーマコンフォート (皮膚ケア)", brand: "Royal Canin", tags: ["dog", "adult", "skin", "tear"], img: "https://unsplash.com", amz: "#" },
    { name: "CCN ジョイントケア (関節サポート)", brand: "Royal Canin", tags: ["dog", "adult", "joint"], img: "https://unsplash.com", amz: "#" },
    { name: "CCN ユリナリー ケア (尿路健康維持)", brand: "Royal Canin", tags: ["dog", "adult", "kidney"], img: "https://unsplash.com", amz: "#" },

    // --- 猫用 (キャットフード) ---
    { name: "ロイヤルカナン ユリナリー ケア (尿路健康)", brand: "Royal Canin", tags: ["cat", "adult", "kidney"], img: "https://unsplash.com", amz: "#" },
    { name: "ロイヤルカナン インドア (室内猫用)", brand: "Royal Canin", tags: ["cat", "adult", "diet"], img: "https://unsplash.com", amz: "#" },
    { name: "銀のスプーン 贅沢うまみ仕立て 尿路ケア", brand: "銀のスプーン", tags: ["cat", "adult", "kidney"], img: "https://unsplash.com", amz: "#" },
    { name: "シーバ デュオ まぐろ味セレクション", brand: "Sheba", tags: ["cat", "adult", "appetite"], img: "https://unsplash.com", amz: "#" },
    { name: "ナチュラル チョイス 室内猫用 アダルト チキン", brand: "Nutro", tags: ["cat", "adult", "diet", "chicken"], img: "https://unsplash.com", amz: "#" },
    { name: "シュプレモ 白身魚＆サーモン (猫用)", brand: "Supremo", tags: ["cat", "adult", "gf", "appetite", "fish"], img: "https://unsplash.com", amz: "#" },

    // ※ここに「涙やけケア(tear)」もいくつか含めました
];

function toggleFilter(btn) {
    const category = btn.getAttribute('data-cat');
    const value = btn.getAttribute('data-val');
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilters[category] = value;
    render();
}

function render() {
    const list = document.getElementById('product-list');
    const searchVal = document.getElementById('search-input').value.toLowerCase();
    list.innerHTML = "";
    
    productData.forEach(item => {
        const matchAnimal = activeFilters.animal === 'all' || item.tags.includes(activeFilters.animal);
        const matchCond = activeFilters.cond === 'all' || item.tags.includes(activeFilters.cond);
        const matchSearch = item.name.toLowerCase().includes(searchVal) || item.tags.some(t => t.includes(searchVal));

        if (matchAnimal && matchCond && matchSearch) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="img-container"><img src="${item.img}"></div>
                <span class="brand-name">${item.brand}</span>
                <div class="product-name">${item.name}</div>
                <div class="tag-list">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <a href="${item.amz}" class="btn-shop">AMAZONで確認</a>
            `;
            list.appendChild(card);
        }
    });
}
render();
</script>
</body>
</html>
