<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pet925 | Premium Pet Nutrition</title>
    <meta name="description" content="科学的な根拠に基づいたプレミアムキャットフード・ドッグフードの選定ガイド。涙やけや皮膚ケアなど、お悩み別に最適な一皿を見つけます。">
    <!-- データの読み込み -->
    <script src="data.js"></script>

    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: "Helvetica Neue", "Hiragino Sans", sans-serif; background: #fff; color: var(--dark); margin: 0; padding-bottom: 60px; line-height: 1.6; }
        
        /* ヘッダー：スタイリッシュな小文字デザイン */
        header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-size: 3rem; letter-spacing: 12px; margin: 0; font-weight: 200; text-transform: none; }
        .sub-copy { font-size: 0.7rem; letter-spacing: 4px; color: var(--gold); margin-top: 10px; text-transform: uppercase; }

        .container { width: 92%; max-width: 1100px; margin: 0 auto; }

        /* 検索バー：ミニマルデザイン */
        .search-container { margin: 30px 0; }
        #search-input { width: 100%; padding: 18px; border: 1px solid #eee; border-radius: 0; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        #search-input:focus { border-color: var(--dark); background: var(--gray); }

        /* 複数絞り込みナビ：日本語併記・横スクロール */
        .filter-nav { position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
        .filter-group { margin-bottom: 10px; }
        .group-label { font-size: 0.6rem; font-weight: 700; color: #bbb; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .scroll-box { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .scroll-box::-webkit-scrollbar { display: none; }
        .filter-btn { background: #fff; border: 1px solid #eee; padding: 8px 18px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: var(--dark); color: #fff; border-color: var(--dark); font-weight: bold; }

        /* 商品カード：カタログのような美しさ */
        #product-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; margin-top: 40px; }
        .product-card { display: flex; flex-direction: column; }
        .img-container { width: 100%; height: 380px; overflow: hidden; background: var(--gray); position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .product-card:hover img { transform: scale(1.05); }
        
        .card-content { padding: 20px 0; flex-grow: 1; }
        .brand-badge { font-size: 0.65rem; color: var(--gold); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        .product-name { font-size: 1.15rem; font-weight: 500; margin: 10px 0; color: #000; line-height: 1.4; }
        .description { font-size: 0.85rem; color: #666; margin-bottom: 15px; min-height: 3em; }
        
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .tag { font-size: 0.6rem; color: #999; border: 1px solid #eee; padding: 3px 8px; text-transform: uppercase; }
        
        /* 特典情報のテキスト */
        .promo-text { font-size: 0.75rem; color: #e67e22; font-weight: bold; margin-bottom: 10px; display: block; }
        /* おすすめバッジ */
        .featured-badge { position: absolute; top: 10px; left: 10px; background: var(--gold); color: #fff; padding: 4px 12px; font-size: 0.7rem; font-weight: bold; z-index: 10; }
        /* 最安値バッジ（ボタン内） */
        .lowest-price-badge { background: #27ae60; color: #fff; padding: 2px 6px; font-size: 0.6rem; border-radius: 2px; margin-left: 5px; vertical-align: middle; }
        /* 価格の強調表示 */
        .price-text { font-family: "Helvetica Neue", sans-serif; font-weight: 600; margin-left: 4px; }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: #999; font-size: 0.9rem; letter-spacing: 2px; }

        /* モール別ボタン */
        .shop-links { display: flex; flex-direction: column; gap: 8px; }
        .btn-shop { text-decoration: none; padding: 12px; font-size: 0.75rem; font-weight: 700; text-align: center; border-radius: 4px; transition: 0.3s; letter-spacing: 1px; }
        .btn-amz { background: #232f3e; color: #fff; }
        .btn-rak { background: #bf0000; color: #fff; }
        .btn-a8 { background: #d35400; color: #fff; border: 2px solid #d35400; position: relative; overflow: hidden; }
        .btn-a8:after { content: '★ 一番おすすめ'; position: absolute; right: 10px; font-size: 0.6rem; opacity: 0.8; }
        .btn-yah { background: #ff0033; color: #fff; }
        .btn-shop:hover { opacity: 0.8; transform: translateY(-2px); }

    </style>
</head>
<body>

<header>
    <h1>pet925</h1>
    <div class="sub-copy">Scientific Nutrition x High Style</div>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="キーワードを入力（例：歯, シニア, 涙やけ）" oninput="render()">
    </div>

    <div class="filter-nav">
        <div class="filter-group">
            <span class="group-label">Animal / 種類</span>
            <div class="scroll-box" id="filter-animal">
                <!-- JSで自動生成 -->
            </div>
        </div>
        <div class="filter-group">
            <span class="group-label">Condition / お悩み</span>
            <div class="scroll-box" id="filter-cond">
                <!-- JSで自動生成 -->
            </div>
        </div>
    </div>

    <div id="product-list"></div>
</div>

<script>
let activeFilters = { animal: "all", cond: "all" };

function toggleFilter(btn) {
    const category = btn.getAttribute('data-cat');
    const value = btn.getAttribute('data-val');
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilters[category] = value;
    render();
}

function renderFilters() {
    if (typeof tagMaster === 'undefined') return;
    
    for (const [category, tags] of Object.entries(tagMaster)) {
        const container = document.getElementById(`filter-${category}`);
        if (!container) continue;

        let html = `<button class="filter-btn active" data-cat="${category}" data-val="all" onclick="toggleFilter(this)">すべて</button>`;
        
        for (const [tagKey, tagName] of Object.entries(tags)) {
            html += `<button class="filter-btn" data-cat="${category}" data-val="${tagKey}" onclick="toggleFilter(this)">${tagName}</button>`;
        }
        container.innerHTML = html;
    }
}

// 価格表示とショップ名を表示するヘルパー
function getShopButtonContent(shopName, price, isLowest) {
    // 価格がない場合はデフォルトのテキストを返す
    if (!price || price === "" || price === "0" || isNaN(Number(price))) {
        return `${shopName}で最安値を確認`;
    }
    const formattedPrice = Number(price).toLocaleString();
    return `
        ${shopName}: <span class="price-text">¥${formattedPrice}</span>
        ${isLowest ? '<span class="lowest-price-badge">最安値</span>' : ''}
    `;
}

// 各サイトの最安値検索URLを生成するヘルパー
function getSearchUrl(shop, name, fallbackUrl) {
    if (fallbackUrl && fallbackUrl !== '#') return fallbackUrl;
    const q = encodeURIComponent(name);
    if (shop === 'amz') return `https://www.amazon.co.jp/s?k=${q}&s=price-asc-rank`;
    if (shop === 'rak') return `https://search.rakuten.co.jp/search/mall/${q}/?s=2`;
    if (shop === 'yah') return `https://shopping.yahoo.co.jp/search?p=${q}&ss_first=1&X=2`;
    return '#';
}

function render() {
    if (typeof productData === 'undefined') return;
    if (!productData || productData.length === 0) return;
    const list = document.getElementById('product-list');
    const searchVal = document.getElementById('search-input').value.toLowerCase().replace(/　/g, ' ').trim();
    const searchWords = searchVal.split(/\s+/).filter(w => w !== '');
    
    list.innerHTML = "";
    let matchCount = 0;
    
    productData.forEach(item => {
        const matchAnimal = activeFilters.animal === 'all' || item.tags.includes(activeFilters.animal);
        const matchCond = activeFilters.cond === 'all' || item.tags.includes(activeFilters.cond);
        const matchSearch = searchWords.every(word => 
            item.name.toLowerCase().includes(word) || 
            item.brand.toLowerCase().includes(word) || 
            item.tags.some(t => t.toLowerCase().includes(word)) ||
            (item.label && item.label.toLowerCase().includes(word)) ||
            (item.promo && item.promo.toLowerCase().includes(word))
        );

        if (matchAnimal && matchCond && matchSearch) {
            matchCount++;
            const card = document.createElement('div');
            card.className = 'product-card';

            // 最安値の判定ロジック（数値が有効なものだけを抽出）
            const parseP = (p) => {
                const n = Number(p);
                return (p && !isNaN(n) && n > 0) ? n : Infinity;
            };
            
            const prices = [
                { id: 'amz', val: parseP(item.amz_p) },
                { id: 'rak', val: parseP(item.rak_p) },
                { id: 'yah', val: parseP(item.yah_p) }
            ].filter(p => p.val !== Infinity);
            
            const lowestPriceObj = prices.length > 0 ? prices.reduce((min, p) => p.val < min.val ? p : min, prices[0]) : null;
            const minPrice = lowestPriceObj ? lowestPriceObj.val : null;

            // 画像がない、または未設定（#）の場合は、代わりの画像を表示
            const defaultImg = "https://images.unsplash.com/photo-1544568100-847a948585b9?q=80&w=1000&auto=format&fit=crop";
            const imageSource = (item.img && item.img !== "#") ? item.img : defaultImg;

            card.innerHTML = `
                <div class="img-container">
                    ${item.label ? `<div class="featured-badge">${item.label}</div>` : ''}
                    <img src="${imageSource}" alt="${item.name}" onerror="this.src='${defaultImg}'">
                </div>
                <div class="card-content">
                    <span class="brand-badge">${item.brand}</span>
                    <div class="product-name">${item.name}</div>
                    <p class="description">${item.desc || ""}</p>
                    <div class="tag-list">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <div class="shop-links">
                        ${item.promo ? `<span class="promo-text">${item.promo}</span>` : ''}
                        ${item.a8 && item.a8 !== '#' ? `
                            <a href="${item.a8}" target="_blank" rel="nofollow" class="btn-shop btn-a8">
                                公式サイトで詳細を見る
                            </a>
                        ` : ''}
                        <a href="${getSearchUrl('amz', item.name, item.amz)}" class="btn-shop btn-amz" target="_blank" rel="nofollow">${getShopButtonContent('Amazon', item.amz_p, minPrice && parseP(item.amz_p) === minPrice)}</a>
                        <a href="${getSearchUrl('rak', item.name, item.rak)}" class="btn-shop btn-rak" target="_blank" rel="nofollow">${getShopButtonContent('楽天', item.rak_p, minPrice && parseP(item.rak_p) === minPrice)}</a>
                        <a href="${getSearchUrl('yah', item.name, item.yah)}" class="btn-shop btn-yah" target="_blank" rel="nofollow">${getShopButtonContent('Yahoo!', item.yah_p, minPrice && parseP(item.yah_p) === minPrice)}</a>
                    </div>
                </div>
            `;
            list.appendChild(card);
        }
    });

    if (matchCount === 0) {
        list.innerHTML = `
            <div class="no-results">
                NO PRODUCTS FOUND<br>条件に合う商品が見つかりませんでした
            </div>`;
    }
}
// ページ読み込み時に描画を開始
window.addEventListener('DOMContentLoaded', () => {
    if (typeof productData !== 'undefined') {
        renderFilters();
        render();
    }
});
</script>
</body>
</html>
